name: CI

on:
  push:
  pull_request:

jobs:
  elixir:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "29.0.1"

      - name: Install dependencies
        run: mix deps.get

      - name: Format
        run: mix format --check-formatted

      - name: Test
        run: mix test
